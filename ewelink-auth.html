<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eWeLink prisijungimas</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 20px; background: #1a1a2e; color: #e0e0e0; text-align: center; }
    h1 { color: #4fc3f7; margin-bottom: 8px; font-size: 1.4rem; }
    p  { color: #90a4ae; font-size: 0.9rem; margin-bottom: 24px; }
    .status { border-radius: 8px; padding: 20px; font-size: 1rem; line-height: 1.6; }
    .status.ok  { background: #0a1f0a; border: 1px solid #2e7d32; color: #a5d6a7; }
    .status.err { background: #1f0a0a; border: 1px solid #c62828; color: #ef9a9a; }
    .status.loading { background: #0d2137; border: 1px solid #0f3460; color: #81d4fa; }
    a { color: #4fc3f7; text-decoration: none; display: inline-block; margin-top: 16px; font-size: 0.85rem; }
    a:hover { text-decoration: underline; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #4fc3f7; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>🔑 eWeLink prisijungimas</h1>
  <p>Tokenų atnaujinimas</p>
  <div id="status" class="status loading">
    <span class="spinner"></span> Kraunama...
  </div>
  <a href="/kontrole/">← Grįžti į kontrolės panelę</a>

<script>
  const EXCHANGE_FN = 'https://xyzttzqvbescdpihvyfu.supabase.co/functions/v1/ewelink-oauth'

  const statusEl = document.getElementById('status')

  function show(type, html) {
    statusEl.className = 'status ' + type
    statusEl.innerHTML = html
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const params  = new URLSearchParams(window.location.search)
    const success = params.get('success')
    const error   = params.get('error')
    window.history.replaceState({}, '', window.location.pathname)

    if (success === '1') {
      show('ok', '✅ Tokenai sėkmingai atnaujinti!<br><small style="opacity:0.7">Dabar galima valdyti vartus ir šviesą.</small>')
      return
    }

    if (error) {
      show('err', '❌ Klaida: ' + decodeURIComponent(error))
      return
    }

    // No params — fetch OAuth URL and redirect immediately
    try {
      show('loading', '<span class="spinner"></span> Jungiamasi prie eWeLink...')
      const resp = await fetch(EXCHANGE_FN, { method: 'GET' })
      const data = await resp.json()
      if (!data.success || !data.url) {
        show('err', '❌ Nepavyko gauti prisijungimo URL.<br><small>' + (data.error || '') + '</small>')
        return
      }
      window.location.href = data.url
    } catch (err) {
      show('err', '❌ Klaida: ' + err.message)
    }
  })
</script>
</body>
</html>
